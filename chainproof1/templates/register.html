<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register - ChainProof</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .register-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            padding: 40px;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,.3);
        }

        .form-control {
            border-radius: 12px;
            padding: 14px;
        }

        .btn-register {
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
        }

        .logo {
            font-size: 50px;
            text-align: center;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        .alert-custom {
            background: rgba(255,0,0,.1);
            border: 1px solid rgba(255,0,0,.3);
            color: #fca5a5;
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="register-card">

    <div class="logo">
        🔐
    </div>

    <h2 class="text-center mb-2">
        Buat Akun
    </h2>

    <p class="text-center text-secondary mb-4">
        Daftar ke ChainProof
    </p>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>
        </div>

        <button
            type="submit"
            class="btn btn-success btn-register w-100">

            Register
        </button>

    </form>

    {% if message %}
    <div class="alert-custom">
        {{ message }}
    </div>
    {% endif %}

    <p class="text-center mt-4">
        Sudah punya akun?
        <a href="/login">
            Login
        </a>
    </p>

</div>

</body>
</html>
