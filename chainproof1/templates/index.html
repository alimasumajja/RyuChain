<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>ChainProof</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0b1120;
            color:white;
            font-family:'Inter',sans-serif;
            overflow-x:hidden;
        }

        /* Sidebar */
        .sidebar{
            width:270px;
            height:100vh;
            position:fixed;
            top:0;
            left:0;
            background:#111827;
            border-right:1px solid rgba(255,255,255,.06);
            padding:28px 18px;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:12px;
            font-size:24px;
            font-weight:700;
            margin-bottom:45px;
            padding-left:10px;
        }

        .logo-icon{
            width:46px;
            height:46px;
            border-radius:14px;
            background:linear-gradient(
                135deg,
                #2563eb,
                #4f46e5
            );

            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
        }

        /* Menu */
        .menu-title{
            color:#64748b;
            font-size:13px;
            margin-bottom:14px;
            padding-left:14px;
            text-transform:uppercase;
        }

        .menu a{
            display:flex;
            align-items:center;
            gap:14px;

            text-decoration:none;
            color:#cbd5e1;

            padding:14px 18px;
            margin-bottom:10px;

            border-radius:18px;

            transition:.25s ease;
        }

        .menu a:hover{
            background:rgba(
                255,
                255,
                255,
                .06
            );

            color:white;
        }

        .menu .active{
            background:linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            color:white;
        }

        /* Main content */
        .main-content{
            margin-left:270px;
            padding:40px;
            min-height:100vh;
        }

        /* Topbar */
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:35px;
        }

        .topbar h2{
            font-size:30px;
            font-weight:700;
        }

        .topbar p{
            color:#94a3b8;
            margin-top:4px;
        }

        .user-box{
            background:#111827;
            padding:12px 18px;
            border-radius:18px;
            border:1px solid rgba(
                255,
                255,
                255,
                .08
            );
        }

        /* Card */
        .glass-card{
            background:rgba(
                255,
                255,
                255,
                .04
            );

            border:1px solid rgba(
                255,
                255,
                255,
                .08
            );

            border-radius:28px;

            padding:30px;

            backdrop-filter:blur(
                14px
            );
        }

        /* Form */
        .form-control{
            background:#1e293b;
            border:none;
            border-radius:16px;
            padding:16px;
            color:white;
        }

        .form-control:focus{
            background:#1e293b;
            color:white;
            box-shadow:none;
            border:1px solid #2563eb;
        }

        /* Button */
        .btn-custom{
            border-radius:16px;
            padding:14px;
            font-weight:600;
        }

        /* Table */
        .table{
            color:white;
        }

        .table th{
            border:none;
            color:#94a3b8;
        }

        .table td{
            border-color:rgba(
                255,
                255,
                255,
                .05
            );
        }

        .hash-box{
            max-width:260px;
            word-break:break-word;
            font-size:12px;
            color:#93c5fd;
        }

        .timeline{
            position:relative;
            max-width:900px;
        }

        .timeline-item{
            position:relative;
            padding-left:80px;
            margin-bottom:40px;
        }

        .chain-node{
            width:50px;
            height:50px;
            border-radius:50%;
            background:#2563eb;
            display:flex;
            align-items:center;
            justify-content:center;
            position:absolute;
            left:0;
            top:20px;
            font-size:20px;
            box-shadow:
            0 0 20px rgba(37,99,235,.4);
        }

        .chain-line{
            position:absolute;
            left:24px;
            top:70px;
            width:3px;
            height:calc(100% + 20px);
            background:
            rgba(37,99,235,.4);
        }

        .block-card{
            transition:.3s;
        }

        .block-card:hover{
            transform:
            translateY(-4px);
        }

    </style>

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    

    <div class="logo">
        

        <div class="logo-icon">
            🔗
        </div>

        RyuChain

    </div>

    <div class="menu">
        <a class="user-box">

            👤 {{ session.user }}

        </a>

        <div class="menu-title">
            Navigation
        </div>

        <a href="/blockchain"
           class="{% if request.path == '/blockchain' %}active{% endif %}">

            🏠 Dashboard

        </a>

        {% if session.get('user') %}
            <a href="/upload" class="{% if request.path == '/upload' %}active{% endif %}">

                📄 Upload

            </a>
        {% endif %}

        <a href="/verify"
           class="{% if request.path == '/verify' %}active{% endif %}">

            ✅ Verifikasi

        </a>
        
        {% if session.get('user') %}
            <a href="/logout">

                🚪 Logout

            </a>
        {% else %}
            <a href="/login" class="{% if request.path == '/login' %} active{% endif %}">

                🔐 Login

            </a>

        {% endif %}

    </div>

</div>

<!-- Main -->
<div class="main-content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
